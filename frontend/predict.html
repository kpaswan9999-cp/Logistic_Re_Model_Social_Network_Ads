<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConvergeAI | Predictive Social Network Intelligence</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow"></div>
    <div class="particles"></div>

    <nav>
        <a href="index.html" class="logo" style="text-decoration: none;">CONVERGE<span style="color: var(--accent-magenta)">.AI</span></a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="predict.html" class="active">Analyze</a>
            <a href="#">Technology</a>
        </div>
        <div class="status-badge" id="systemStatus">
            <div class="status-dot"></div>
            CONNECTING...
        </div>
    </nav>

    <div class="container">
        <div class="glass-card">
            <h2 style="margin-bottom: 2rem; font-weight: 700; text-align: center; letter-spacing: 2px; text-transform: uppercase;">Demographic Vector Input</h2>
            
            <div class="form-group">
                <label>AGE VECTO (18 - 60)</label>
                <div class="input-container">
                    <input type="number" id="age" value="25" min="18" max="60">
                </div>
            </div>

            <div class="form-group">
                <label>ESTIMATED ANNUAL SALARY (USD)</label>
                <div class="input-container">
                    <input type="range" id="salary" min="15000" max="150000" step="500" value="45000">
                    <span class="range-val" id="salaryVal">$45,000</span>
                </div>
            </div>

            <button class="btn btn-primary" id="predictBtn" style="width: 100%; height: 60px; font-size: 1rem;">Execute Inference</button>
        </div>

        <div id="resultZone">
            <div id="orb" class="result-orb"></div>
            <h1 id="resultTitle" class="result-main"></h1>
            <p class="result-label" id="resultLabel"></p>

            <div class="stat-grid">
                <div class="stat-item">
                    <div class="stat-val" id="confidenceVal">0%</div>
                    <div class="stat-label">Inference Confidence</div>
                    <div class="progress-container">
                        <div class="progress-bar" id="confBar"></div>
                    </div>
                </div>
                <div class="stat-item">
                    <div class="stat-val" id="conversionImpact">0%</div>
                    <div class="stat-label">Market Impact Probability</div>
                    <div class="progress-container">
                        <div class="progress-bar" id="impactBar" style="background: var(--accent-magenta)"></div>
                    </div>
                </div>
            </div>
            
            <button class="btn btn-glass" onclick="window.location.reload()" style="margin-top: 3rem;">Reset Analysis</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
