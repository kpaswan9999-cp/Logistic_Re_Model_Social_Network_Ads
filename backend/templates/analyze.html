{% extends "base.html" %}

{% block title %}SocialFlow | Analyzer{% endblock %}

{% block content %}
<section class="page-container">
    <div class="glass-card analyzer-card">
        <h2 class="page-title">INFERENCE INPUT</h2>
        <p class="subtitle">Enter User Demographics for Neural Analysis</p>

        <form id="predictionForm">
            <div class="form-group">
                <label for="age">Target User Age</label>
                <div class="input-container">
                    <input type="number" id="age" name="age" step="1" min="18" max="60" value="30" required>
                    <span class="unit">YEARS</span>
                </div>
            </div>

            <div class="form-group">
                <label for="salary">Estimated Annual Salary</label>
                <div class="input-container">
                    <input type="number" id="salary" name="salary" step="10000" min="50000" max="10000000" value="1200000" required>
                    <span class="unit">INR (₹)</span>
                </div>
            </div>

            <button type="submit" class="predict-btn" id="submitBtn">
                EXECUTE NEURAL INFERENCE
            </button>
        </form>

        <div id="loader" class="hidden">
            <div class="spinner"></div>
            <p>Scanning Neural Patterns...</p>
        </div>
    </div>
</section>
{% endblock %}
